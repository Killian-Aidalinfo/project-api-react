services:
  db:
    image: mysql:9.1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: atelier
      MYSQL_USER: atelier
      MYSQL_PASSWORD: atelierpwd
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpwd"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: atelier
      DB_PASSWORD: atelierpwd
      DB_NAME: atelier
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
